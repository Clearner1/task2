[importlinter]
root_package = task2_backend

[importlinter:contract:layered_architecture]
name = Backend layered architecture
type = layers
containers =
    task2_backend
layers =
    api
    domains
    foundation
    common

[importlinter:contract:domain_independence]
name = Domain independence
type = independence
modules =
    task2_backend.domains.media
    task2_backend.domains.annotation
    task2_backend.domains.review_export
